<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Rejectx</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body>

  <header>

    <div class="logo">
      REJECTX
    </div>

    <nav>

      <a href="#home">Home</a>

      <a href="#source">Source</a>

      <a href="#login">Login</a>

      <a href="#status">Status</a>

      <a href="#support">Support</a>

    </nav>

  </header>

  <section class="hero" id="home">

    <div class="overlay"></div>

    <div class="hero-content">

      <h1>REJECTX</h1>

      <p>
        Plataforma gamer premium.
      </p>

      <div class="buttons">

        <button>
          DOWNLOAD
        </button>

        <button class="outline">
          SOURCE
        </button>

      </div>

    </div>

  </section>

  <section class="cards">

    <div class="card">

      <h2>DATABASE</h2>

      <p>
        Sistema conectado ao Supabase.
      </p>

    </div>

    <div class="card">

      <h2>SECURITY</h2>

      <p>
        Login criptografado e autenticação segura.
      </p>

    </div>

    <div class="card">

      <h2>PROTECTION</h2>

      <p>
        Compatível com Cloudflare.
      </p>

    </div>

  </section>

  <section class="login-box" id="login">

    <h2>LOGIN PANEL</h2>

    <input type="email" id="email" placeholder="Email">

    <input type="password" id="password" placeholder="Password">

    <button onclick="register()">
      REGISTER
    </button>

    <button onclick="login()">
      LOGIN
    </button>

  </section>

  <section class="source-section" id="source">

    <h2>DOWNLOAD SOURCE</h2>

    <a href="assets/source.zip" download>

      <button>
        DOWNLOAD HTML SOURCE
      </button>

    </a>

  </section>

  <footer>

    Rejectx © 2026

  </footer>

  <script src="particles.js"></script>

  <script src="script.js"></script>

</body>
</html>
